<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏆 FIFA World Cup 2026 Simulator</h1>
        <p>Predict the ultimate world champion step by step</p>
    </header>

    <main class="container">
        <!-- মোড সিলেকশন এবং কন্ট্রোল বাটন সমূহ -->
        <section class="controls-section">
            <div class="mode-selector">
                <label class="mode-label">
                    <input type="radio" name="simMode" id="mode-direct" value="direct" checked> 1st/2nd/3rd Direct Rank
                </label>
                <label class="mode-label">
                    <input type="radio" name="simMode" id="mode-score" value="score"> ⚽ Match Score Mode
                </label>
            </div>

            <div class="action-buttons">
                <button id="generate-ko-btn" class="btn btn-primary">Generate Knockouts ➔</button>
                <button id="reset-btn" class="btn btn-danger">Reset All</button>
            </div>
        </section>

        <!-- গ্রুপ স্টেজ সেকশন -->
        <section id="group-stage-section">
            <h2>📋 Group Stage (48 Teams in 12 Groups)</h2>
            <div id="groups-container" class="groups-grid">
                <!-- জাভাস্ক্রিপ্ট এর মাধ্যমে গ্রুপগুলো এখানে লোড হবে -->
            </div>
        </section>

        <!-- নকআউট ব্র্যাকেট সেকশন -->
        <section id="knockout-section" class="id-disabled">
            <hr class="section-divider">
            <h2>Tournament Bracket (Knockout Stage)</h2>
            
            <div class="champion-display">
                <h3>👑 WORLD CHAMPION 👑</h3>
                <div id="champion-name" class="champion-crown">???</div>
            </div>

            <div class="bracket-container">
                <!-- Round of 32 -->
                <div class="round-column">
                    <div class="round-header">Round of 32</div>
                    <div id="r32-slots" class="match-list"></div>
                </div>

                <!-- Round of 16 -->
                <div class="round-column">
                    <div class="round-header">Round of 16</div>
                    <div id="r16-slots" class="match-list"></div>
                </div>

                <!-- Quarter Finals -->
                <div class="round-column">
                    <div class="round-header">Quarter Finals</div>
                    <div id="qf-slots" class="match-list"></div>
                </div>

                <!-- Semi Finals -->
                <div class="round-column">
                    <div class="round-header">Semi Finals</div>
                    <div id="sf-slots" class="match-list"></div>
                </div>

                <!-- Final -->
                <div class="round-column">
                    <div class="round-header">Final</div>
                    <div id="f-slots" class="match-list"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
